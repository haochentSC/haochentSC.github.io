<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #ffffff; --color-border: #d0d7de; --color-surface: #f6f8fa;
        --color-text: #1f2328; --color-muted: #57606a; --color-faint: #818b98;
        --color-accent: #1a7f37; --grid-line: rgba(26, 127, 55, 0.06); color-scheme: light;
      }
      :root[data-theme='dark'] {
        --color-bg: #0a0e14; --color-border: #1f2630; --color-surface: #0d1117;
        --color-text: #c9d1d9; --color-muted: #8b949e; --color-faint: #6e7681;
        --color-accent: #3fb950; --grid-line: rgba(63, 185, 80, 0.05); color-scheme: dark;
      }
      body { background: var(--color-bg); color: var(--color-text); font-family: 'Inter', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .grid-bg {
        background-image:
          linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .cursor::after { content: '▋'; color: var(--color-accent); animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .ds-toggle {
        position: fixed; top: 12px; right: 12px; z-index: 99; border: 1px solid var(--color-border);
        background: var(--color-surface); color: var(--color-muted); font-family: 'JetBrains Mono', monospace;
        font-size: 12px; border-radius: 6px; padding: 6px 10px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button class="ds-toggle" onclick="var r=document.documentElement;r.getAttribute('data-theme')==='dark'?r.removeAttribute('data-theme'):r.setAttribute('data-theme','dark');">◑ theme</button>
    <section class="grid-bg">
      <div class="mx-auto max-w-5xl px-6 py-20">
        <p class="mono text-sm" style="color: var(--color-accent)">// contact</p>
        <h2 class="mono mt-4 text-2xl font-bold">Let's build something.<span class="cursor"></span></h2>
        <p class="mt-3 max-w-xl text-sm leading-relaxed" style="color: var(--color-muted)">
          Open to SWE and AI-infra roles. The fastest way to reach me is email.
        </p>
        <div class="mt-6 flex flex-wrap gap-4 mono text-sm">
          <a href="#" style="color: var(--color-accent)">tonghaochen77@gmail.com</a>
          <span style="color: var(--color-faint)">·</span>
          <a href="#" style="color: var(--color-muted)">github</a>
          <span style="color: var(--color-faint)">·</span>
          <a href="#" style="color: var(--color-muted)">linkedin</a>
        </div>
      </div>
    </section>
    <footer class="border-t" style="border-color: var(--color-border)">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-6 mono text-xs" style="color: var(--color-faint)">
        <span>© 2026 Haochen Tong</span>
        <span>built with Astro · source</span>
      </div>
    </footer>
  </body>
</html>
