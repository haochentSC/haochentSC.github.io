<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { --bg: #0a0e14; --border: #1f2630; --text: #c9d1d9; --muted: #8b949e; --faint: #6e7681; --accent: #3fb950; }
      body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .grid-bg {
        background-image:
          linear-gradient(to right, rgba(63, 185, 80, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(63, 185, 80, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .cursor::after { content: '▋'; color: var(--accent); animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <section class="grid-bg">
      <div class="mx-auto max-w-5xl px-6 py-20">
        <p class="mono text-sm" style="color: var(--accent)">// contact</p>
        <h2 class="mono mt-4 text-2xl font-bold">Let's build something.<span class="cursor"></span></h2>
        <p class="mt-3 max-w-xl text-sm leading-relaxed" style="color: var(--muted)">
          Open to SWE and AI-infra roles. The fastest way to reach me is email.
        </p>
        <div class="mt-6 flex flex-wrap gap-4 mono text-sm">
          <a href="#" style="color: var(--accent)">tonghaochen77@gmail.com</a>
          <span style="color: var(--faint)">·</span>
          <a href="#" style="color: var(--muted)">github</a>
          <span style="color: var(--faint)">·</span>
          <a href="#" style="color: var(--muted)">linkedin</a>
        </div>
      </div>
    </section>
    <footer class="border-t" style="border-color: var(--border)">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-6 mono text-xs" style="color: var(--faint)">
        <span>© 2026 Haochen Tong</span>
        <span>built with Astro · source</span>
      </div>
    </footer>
  </body>
</html>
