<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { --bg: #0a0e14; --border: #1f2630; --text: #c9d1d9; --muted: #8b949e; --accent: #3fb950; }
      body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </head>
  <body>
    <header class="border-b" style="border-color: var(--border); background: rgba(10, 14, 20, 0.85); backdrop-filter: blur(8px)">
      <nav class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
        <a href="#" class="mono text-sm font-bold"><span style="color: var(--accent)">~/</span>haochen.tong</a>
        <ul class="flex gap-6 mono text-sm" style="color: var(--muted)">
          <li><a href="#" class="hover:text-white">work</a></li>
          <li><a href="#" class="hover:text-white">experience</a></li>
          <li><a href="#" class="hover:text-white">skills</a></li>
          <li><a href="#" class="hover:text-white">contact</a></li>
        </ul>
      </nav>
    </header>
    <div class="p-10 mono text-xs" style="color: var(--muted)">sticky top nav · mono · thin bottom border · blur backdrop</div>
  </body>
</html>
