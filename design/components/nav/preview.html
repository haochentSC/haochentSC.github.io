<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #ffffff; --color-bg-rgb: 255, 255, 255; --color-border: #d0d7de;
        --color-surface: #f6f8fa; --color-text: #1f2328; --color-muted: #57606a; --color-accent: #1a7f37;
        color-scheme: light;
      }
      :root[data-theme='dark'] {
        --color-bg: #0a0e14; --color-bg-rgb: 10, 14, 20; --color-border: #1f2630;
        --color-surface: #0d1117; --color-text: #c9d1d9; --color-muted: #8b949e; --color-accent: #3fb950;
        color-scheme: dark;
      }
      body { background: var(--color-bg); color: var(--color-text); font-family: 'Inter', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .ds-toggle {
        position: fixed; top: 12px; right: 12px; z-index: 99; border: 1px solid var(--color-border);
        background: var(--color-surface); color: var(--color-muted); font-family: 'JetBrains Mono', monospace;
        font-size: 12px; border-radius: 6px; padding: 6px 10px; cursor: pointer;
      }
      .toggle-chip {
        display: inline-flex; height: 32px; width: 32px; align-items: center; justify-content: center;
        border: 1px solid var(--color-border); border-radius: 6px; color: var(--color-muted);
      }
    </style>
  </head>
  <body>
    <button class="ds-toggle" onclick="var r=document.documentElement;r.getAttribute('data-theme')==='dark'?r.removeAttribute('data-theme'):r.setAttribute('data-theme','dark');">◑ theme</button>
    <header class="border-b" style="border-color: var(--color-border); background: rgba(var(--color-bg-rgb), 0.85); backdrop-filter: blur(8px)">
      <nav class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
        <a href="#" class="mono text-sm font-bold"><span style="color: var(--color-accent)">~/</span>haochen.tong</a>
        <div class="flex items-center gap-5">
          <ul class="flex gap-6 mono text-sm" style="color: var(--color-muted)">
            <li><a href="#">work</a></li>
            <li><a href="#">experience</a></li>
            <li><a href="#">skills</a></li>
            <li><a href="#">contact</a></li>
          </ul>
          <span class="toggle-chip mono" title="theme toggle">◑</span>
        </div>
      </nav>
    </header>
    <div class="p-10 mono text-xs" style="color: var(--color-muted)">sticky top nav · mono · thin bottom border · blur backdrop · light/dark toggle chip</div>
  </body>
</html>
