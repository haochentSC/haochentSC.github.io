<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #ffffff; --color-surface: #f6f8fa; --color-border: #d0d7de;
        --color-text: #1f2328; --color-muted: #57606a; --color-accent: #1a7f37; --color-cyan: #0a7ea4;
        color-scheme: light;
      }
      :root[data-theme='dark'] {
        --color-bg: #0a0e14; --color-surface: #0d1117; --color-border: #1f2630;
        --color-text: #c9d1d9; --color-muted: #8b949e; --color-accent: #3fb950; --color-cyan: #56d4dd;
        color-scheme: dark;
      }
      body { background: var(--color-bg); color: var(--color-text); font-family: 'Inter', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .ds-toggle {
        position: fixed; top: 12px; right: 12px; z-index: 99; border: 1px solid var(--color-border);
        background: var(--color-surface); color: var(--color-muted); font-family: 'JetBrains Mono', monospace;
        font-size: 12px; border-radius: 6px; padding: 6px 10px; cursor: pointer;
      }
    </style>
  </head>
  <body class="p-10">
    <button class="ds-toggle" onclick="var r=document.documentElement;r.getAttribute('data-theme')==='dark'?r.removeAttribute('data-theme'):r.setAttribute('data-theme','dark');">◑ theme</button>
    <p class="mono text-sm" style="color: var(--color-accent)">// skills</p>
    <div class="mt-6 grid gap-6 sm:grid-cols-2">
      <div>
        <h3 class="mono text-sm font-bold" style="color: var(--color-cyan)">GenAI / RAG</h3>
        <ul class="mt-3 flex flex-wrap gap-1.5 mono text-xs" style="color: var(--color-muted)">
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">vLLM</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">RAG</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">BM25</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">RRF</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">CLIP</li>
        </ul>
      </div>
      <div>
        <h3 class="mono text-sm font-bold" style="color: var(--color-cyan)">Distributed Systems</h3>
        <ul class="mt-3 flex flex-wrap gap-1.5 mono text-xs" style="color: var(--color-muted)">
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">gRPC</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">consistent hashing</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">etcd</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">chaos testing</li>
        </ul>
      </div>
      <div>
        <h3 class="mono text-sm font-bold" style="color: var(--color-cyan)">Backend &amp; APIs</h3>
        <ul class="mt-3 flex flex-wrap gap-1.5 mono text-xs" style="color: var(--color-muted)">
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">FastAPI</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">Flask</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">Celery</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">REST</li>
        </ul>
      </div>
      <div>
        <h3 class="mono text-sm font-bold" style="color: var(--color-cyan)">Infra &amp; DevOps</h3>
        <ul class="mt-3 flex flex-wrap gap-1.5 mono text-xs" style="color: var(--color-muted)">
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">Docker</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">AWS</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">Terraform</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--color-border); background: var(--color-surface)">CI/CD</li>
        </ul>
      </div>
    </div>
  </body>
</html>
