<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { --bg: #0a0e14; --surface: #0d1117; --border: #1f2630; --text: #c9d1d9; --muted: #8b949e; --accent: #3fb950; --cyan: #56d4dd; }
      body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </head>
  <body class="p-10">
    <p class="mono text-sm" style="color: var(--accent)">// skills</p>
    <div class="mt-6 grid gap-6 sm:grid-cols-2">
      <div>
        <h3 class="mono text-sm font-bold" style="color: var(--cyan)">GenAI / RAG</h3>
        <ul class="mt-3 flex flex-wrap gap-1.5 mono text-xs" style="color: var(--muted)">
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">vLLM</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">RAG</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">BM25</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">RRF</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">CLIP</li>
        </ul>
      </div>
      <div>
        <h3 class="mono text-sm font-bold" style="color: var(--cyan)">Distributed Systems</h3>
        <ul class="mt-3 flex flex-wrap gap-1.5 mono text-xs" style="color: var(--muted)">
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">gRPC</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">consistent hashing</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">etcd</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">chaos testing</li>
        </ul>
      </div>
      <div>
        <h3 class="mono text-sm font-bold" style="color: var(--cyan)">Backend &amp; APIs</h3>
        <ul class="mt-3 flex flex-wrap gap-1.5 mono text-xs" style="color: var(--muted)">
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">FastAPI</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">Flask</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">Celery</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">REST</li>
        </ul>
      </div>
      <div>
        <h3 class="mono text-sm font-bold" style="color: var(--cyan)">Infra &amp; DevOps</h3>
        <ul class="mt-3 flex flex-wrap gap-1.5 mono text-xs" style="color: var(--muted)">
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">Docker</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">AWS</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">Terraform</li>
          <li class="rounded border px-2.5 py-1" style="border-color: var(--border); background: var(--surface)">CI/CD</li>
        </ul>
      </div>
    </div>
  </body>
</html>
